<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h2>Acessar Nota de Serviço</h2>

    <input type="text" id="numero" placeholder="Digite o número">
    <button onclick="acessar()">Acessar</button>

    <script>
        function acessar() {
            let numero = document.getElementById("numero").value;

            if (numero === "") {
                alert("Digite um número!");
                return;
            }

            let link = "http://192.168.1.110/contratadaweb/consultas/historico/notaservico_detalhe.jsp?NumServ=" 
                        + numero + "&QTE=1";

            // REDIRECIONA DIRETO
            window.location.href = link;

            // Se quiser abrir em nova aba, use:
            // window.open(link, "_blank");
        }
    </script>

</body>
</html>
