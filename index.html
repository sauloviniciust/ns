<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NOTAS DE SERVIÇO</title>

<link rel="icon" type="image/png" href="Imagem1.png">

<style>
:root {
    --bg: #121212;
    --text: #ffffff;
    --box: #1e1e1e;
}

body.dark {
    --bg: #ffffff;
    --text: #000000;
    --box: #f0f0f0;
}

body {
    font-family: Arial, sans-serif;
    padding: 30px;
    background-color: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.container {
    background: var(--box);
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    resize: vertical;
}

button {
    padding: 10px;
    font-size: 14px;
    margin-top: 10px;
    cursor: pointer;
}

.topo {
    text-align: center;
    margin-bottom: 30px;
}

.topo img {
    max-width: 200px;
    display: block;
    margin: 0 auto 10px;
}

.toggle {
    position: fixed;
    top: 10px;
    right: 10px;
}

.info {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleDark()">🌙 / ☀️</button>

<div class="topo">
    <img src="Imagem1.png">
    <h1>NOTAS DE SERVIÇO</h1>
</div>

<!-- BLOCO -->
<div class="container">
    <h2>NSIS</h2>
    <textarea id="nsis" rows="4" placeholder="Cole vários códigos aqui"></textarea>
    <br>
    <button onclick="colar('nsis')">📋 Colar</button>
    <button onclick="acessar('nsis','nsis')">Acessar</button>
    <div class="info" id="info-nsis"></div>
</div>

<div class="container">
    <h2>NSRI</h2>
    <textarea id="nsri" rows="4"></textarea>
    <br>
    <button onclick="colar('nsri')">📋 Colar</button>
    <button onclick="acessar('nsri','nsri')">Acessar</button>
    <div class="info" id="info-nsri"></div>
</div>

<div class="container">
    <h2>NSPR</h2>
    <textarea id="nspr" rows="4"></textarea>
    <br>
    <button onclick="colar('nspr')">📋 Colar</button>
    <button onclick="acessar('nspr','nspr')">Acessar</button>
    <div class="info" id="info-nspr"></div>
</div>

<script>

// separar lista
function processarLista(valor) {
    return [...new Set(
        valor
        .split(/[\n,; ]+/)
        .map(v => v.trim())
        .filter(v => v !== "")
    )];
}

// colar automático
async function colar(id) {
    try {
        const texto = await navigator.clipboard.readText();
        document.getElementById(id).value = texto;
        atualizarInfo(id);
    } catch {
        alert("Não foi possível acessar a área de transferência");
    }
}

// atualizar contador
function atualizarInfo(id) {
    let valor = document.getElementById(id).value;
    let lista = processarLista(valor);
    document.getElementById("info-" + id).innerText =
        "Total: " + lista.length + " código(s)";
}

// abrir links
function acessar(id, tipo) {
    let valor = document.getElementById(id).value;

    if (valor.trim() === "") {
        alert("Digite pelo menos um número!");
        return;
    }

    let lista = processarLista(valor);

    lista.forEach(codigo => {
        let link = "";

        if (tipo === "nsis") {
            link = "http://192.168.1.110/contratadaweb/consultas/at_servicos/notaservico_detalhe.jsp?Gerencia&NumServ=" + codigo + "&QTE=1";
        }

        if (tipo === "nsri") {
            link = "http://192.168.1.110/contratadaweb/consultas/historico/notaservico_detalhe.jsp?NumServ=" + codigo + "&QTE=1";
        }

        if (tipo === "nspr") {
            link = "http://192.168.1.110/contratadaweb/condis/concod/manutencao/relatorio_nspr.jsp?idnsmanut=" + codigo + "&tipoRel=D";
        }

        window.open(link, "_blank");
    });

    document.getElementById("info-" + id).innerText =
        "✔ " + lista.length + " link(s) aberto(s)";

    document.getElementById(id).value = "";
}

// dark mode
function toggleDark() {
    document.body.classList.toggle("dark");
}

// atualizar contador ao digitar
document.querySelectorAll("textarea").forEach(el => {
    el.addEventListener("input", () => atualizarInfo(el.id));
});

</script>

</body>
</html>
